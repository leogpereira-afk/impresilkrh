# Publicação estática no Netlify — sem variáveis de ambiente, sem banco.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: todas as rotas caem no index.html (navegação client-side via React Router).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
